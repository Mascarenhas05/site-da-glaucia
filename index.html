<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoes Store Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="product-box">
            <!-- Galeria de Imagens -->
            <div class="product-images">
                <img src="tenis_azul.png" alt="Tênis Principal" class="main-image" id="mainImage">
                <div class="thumbnails">
                    <img src="tenis_azul.png" class="thumb active" onclick="changeShoe('tenis_azul.png', '#2c3e50')">
                    <img src="tenis_vermelho.png" class="thumb" onclick="changeShoe('tenis_vermelho.png', '#c0392b')">
                    <img src="tenis_preto.png" class="thumb" onclick="changeShoe('tenis_preto.png', '#333')">
                </div>
            </div>

            <!-- Detalhes do Produto -->
            <div class="product-details">
                <h1>Future Sneaker</h1>
                <p class="description">Um tênis moderno com alta tecnologia para conforto diário.</p>
                <div class="price">R$ 399,90</div>
                
                <div class="colors">
                    <span class="color-box blue active" onclick="changeShoe('tenis_azul.png', '#2c3e50')"></span>
                    <span class="color-box red" onclick="changeShoe('tenis_vermelho.png', '#c0392b')"></span>
                    <span class="color-box black" onclick="changeShoe('tenis_preto.png', '#333')"></span>
                </div>

                <button class="buy-btn">Adicionar ao Carrinho</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
